defaults:
  - _self_
  # - exp_settings

multi_head_attn_strategy: True
mode: "extracted_cot_vector" # "generate_self_cot", extracted_cot_vector
output_path: "/data1/wzy/cot-mimic/results/self_cot/gsm8k_ffn"
ckpt_path: null
max_samples: 2000
model_name: qwen2.5-7b-instruct
devices: 2
dtype: torch.float16
data:
  name: "gsm8k"
  source: "/data/share/datasets/gsm8k"
  is_icl: False
  num_query_samples: 1319
  seed: 42
  num_shot: 0
  num_workers: 5

resume: True
query_set: ${data.name}
query_set_size: null # the number of samples to evaluate. if set to null, all samples will be evaluated.
support_set: ${data.name}
batch_size: 8
iterations: null
max_skip_oom: 0
use_cot: False
generation_args:
  num_beams: 1
  max_new_tokens: 512
  length_penalty: 0.0
  do_sample: False
  temperature: 0.0
  top_p: 1.0

eval_mode: EVAL_WITH_COT_VECTOR_DIRECT_Q # 初始选择一种评估模式

# 使用licv(ffn)方式
use_extracted_cot_vector: True # New parameter: set to True to use an extracted CoT vector
use_extracted_cot_vector_type: "licv"
extracted_cot_vector_path: "/data1/wzy/cot-mimic/results/average_cot_vectors/qwen2.5-7b-instruct_gsm8k_avg_cot_vector_mimic.pt"

static_shift_scale: 1.0

use_static_mu: True # Set to True to use a static mu value for extracted CoT vectors
static_mu_value: ${static_shift_scale}  # The static mu value to use when use_static_mu is True

use_base_vector: False  #licv version
only_shift_at_layer: 0 # 第几层开始注入，0表示从第0层开始注入
layer_eval_mode: "single_layer" # Default mode

# Parameters for single_layer evaluation mode:
model_layers: 28 # Total number of layers in your model, e.g., 32 for llama
start_layer: 0   # Inclusive starting layer index for the loop
end_layer: 28    # Exclusive ending layer index for the loop (e.g., 32 means layers 0-31)

# Parameters for combinations evaluation mode:
shift_layers_combinations: [[3,7]]
