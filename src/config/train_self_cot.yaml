defaults:
  - _self_
  - exp_settings

runname: "self_cot_training"
resume: True
lr: ${peft.lr}
weight_decay: 1e-3
warmup_step: 0.1
batch_size: 2
epochs: null # int or null. if null, decide by train.py
ce_loss_weight: ${peft.ce_loss_weight}
align_loss_weight: ${peft.align_loss_weight}
# strategy: deepspeed_stage_2_offload  # Options: "deepspeed_stage_2_offload" / "ddp"
strategy: null  # Options: "deepspeed_stage_2_offload" / "ddp"
accumulate_grad_batches: 2
grad_clip_val: 1.0
precision: 32  # 16-mixed

# New: Number of tokens from the end of the sequence to align for hidden states
align_num_tokens: 10

# model_name: qwen2.5-math-7b-instruct
model_name: llama3-8b

data:
  name: gsm8k
  num_query_samples: 5000 # 训练集样本数量，根据您的需求调整
  num_shot: 1 # 对于学生模型，0 表示直接提问，1 表示 1-shot 示例
  max_seq_len: 2048 # 最大序列长度，确保能容纳教师和学生模型输入

  # Self-CoT configuration
  use_self_cot: True  # Enable Self-CoT training
  self_cot_path: "/home/share/pyz/dataset/gsm8k/self_cot_data_correct_only.jsonl"  # Path to Self-CoT data

  # Training mode for GSM8KDataset with Self-CoT
  # "TRAIN_STUDENT_ONESHOT_SELF_COT": 学生模型使用1shot Q+最终结果示例进行训练，Teacher使用Self-CoT
  # "TRAIN_STUDENT_DIRECT_Q_SELF_COT": 学生模型直接给Q进行训练，Teacher使用Self-CoT
  training_mode: TRAIN_STUDENT_DIRECT_Q_SELF_COT

encoder:
  cls: src.shift_encoder.AttnApproximator # 使用AttnApproximator作为CoT向量的实现
  attn_strategy: "VECTOR_SHIFT|LEARNABLE_SHIFT_SCALE" # MimIC中Attention的策略
  ffn_strategy: "VECTOR_SHIFT" # MimIC中FFN的策略
  shift_scale_init_value: 1.0 # 学习到的移位尺度的初始值 